<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Art Portfolio — Gao Zeqian</title>
    <meta name="description" content="Gao Zeqian — 视觉艺术家 / 数字雕塑师">
    <meta property="og:title" content="Glass Art Portfolio — Gao Zeqian">
    <meta property="og:description" content="Gao Zeqian — 视觉艺术家 / 数字雕塑师">
    <meta property="og:image" content="placeholder-image-url">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-sidebar">
        <h1>作品列表</h1>
        <ul>
            <li>Prism Bloom</li>
            <li>Crystal Vessel</li>
            <li>Liquid Memory</li>
        </ul>
        <h2>联系方式：</h2>
        <p>email@example.com</p>
    </div>
    <main>
        <canvas id="three-canvas"></canvas>
    </main>
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.150.1/build/three.module.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.150.1/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.150.1/examples/jsm/loaders/GLTFLoader.js';
        
        // Three.js version: 0.150.1
        const canvas = document.getElementById('three-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 3);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.25;
        controls.enableZoom = true;
        
        const loader = new GLTFLoader();
        let model;
        loader.load('./model.glb', (gltf) => {
            model = gltf.scene;
            scene.add(model);
            // Center and scale model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            const size = box.getSize(new THREE.Vector3()).length();
            const scale = 1 / size * 2;
            model.scale.set(scale, scale, scale);
        }, undefined, (error) => {
            console.error('An error happened while loading the model:', error);
            // Fallback logic here, e.g., loading a placeholder model
        });
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
