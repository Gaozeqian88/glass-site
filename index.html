<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GLASS ART</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

h1{
  margin-top:40px;
}

/* 3D区域 */
#viewer{
  width:100%;
  height:60vh;
  background:#111;
}

/* 图片 */
img{
  width:60%;
  margin-top:40px;
}
</style>
</head>

<body>

<h1>GLASS ART</h1>

<!-- 3D区域 -->
<div id="viewer"></div>

<!-- 图片（保底） -->
<img src="https://raw.githubusercontent.com/Gaozeqian88/glass-site/main/glass.png">

<!-- Three.js（加了保护，不会再白屏） -->
<script>
try{

const script1 = document.createElement('script');
script1.src = "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js";
document.head.appendChild(script1);

script1.onload = () => {

const script2 = document.createElement('script');
script2.src = "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js";
document.head.appendChild(script2);

const script3 = document.createElement('script');
script3.src = "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js";
document.head.appendChild(script3);

script3.onload = () => {

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,0,10);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight*0.6);
document.getElementById("viewer").appendChild(renderer.domElement);

const light = new THREE.AmbientLight(0xffffff,2);
scene.add(light);

const controls = new THREE.OrbitControls(camera, renderer.domElement);

const loader = new THREE.GLTFLoader();

loader.load("/model.glb", function(gltf){

  const model = gltf.scene;

  // 强制显示
  model.position.set(0,0,0);
  model.scale.set(5,5,5);

  scene.add(model);

  function animate(){
    requestAnimationFrame(animate);
    model.rotation.y += 0.01;
    controls.update();
    renderer.render(scene,camera);
  }

  animate();

}, undefined, function(e){
  console.log("模型加载失败，但页面不会崩");
});

};

};

}catch(e){
console.log("JS出错已拦截，不影响页面");
}
</script>

</body>
</html>
