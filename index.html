<!DOCTYPE html><html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高泽乾 · 玻璃艺术</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script><style>
body{margin:0;background:#000;color:#fff;font-family:"Inter"}
header{position:fixed;top:0;width:100%;padding:24px 60px;z-index:10}
.logo{font-family:"Playfair Display";letter-spacing:4px}
.hero{height:100vh;position:relative}
#canvas3d{width:100%;height:100%}
.overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.overlay h1{font-size:64px;font-family:"Playfair Display"}

.section{padding:120px 80px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:40px;margin-top:60px}
.card{background:#111;padding:40px;cursor:pointer;transition:.3s}
.card:hover{background:#222;transform:translateY(-10px)}
</style></head><body><header>
  <div class="logo">GAO ZEQIAN</div>
</header><section class="hero">
  <div id="canvas3d"></div>
  <div class="overlay">
    <h1>GLASS ART</h1>
    <p>Scroll</p >
  </div>
</section><section class="section">
  <h2>COLLECTION</h2>  <div class="grid">
    <div class="card" onclick="location.href='work.html'">
      <h3>Series 01</h3>
      <p>Core Form</p >
    </div><div class="card" onclick="location.href='work.html'">
  <h3>Series 02</h3>
  <p>Light Study</p >
</div>

<div class="card" onclick="location.href='work.html'">
  <h3>Series 03</h3>
  <p>Reflection</p >
</div>

  </div>
</section><script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.getElementById("canvas3d").appendChild(renderer.domElement);

const light = new THREE.PointLight(0xffffff,2);
light.position.set(5,5,5);
scene.add(light);

const loader = new THREE.GLTFLoader();
let model;

loader.load("glb格式.glb",(gltf)=>{
  model = gltf.scene;
  model.scale.set(2.5,2.5,2.5);
  scene.add(model);
});

camera.position.z = 4;

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

function animate(){
  requestAnimationFrame(animate);
  if(model) model.rotation.y += 0.002;
  controls.update();
  renderer.render(scene,camera);
}
animate();
</script></body>
</html>
