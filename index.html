<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>GAO ZE QIAN / GLASS EXHIBITION</title>

<style>
/* ===================== 基础修复（移动端关键） ===================== */
html, body {
  margin: 0;
  padding: 0;
  height: auto;
  overflow-x: hidden;
  overflow-y: auto;
  background: #0a0a0a;
  font-family: Helvetica, Arial, sans-serif;
  color: white;

  -webkit-overflow-scrolling: touch;
}

/* 防止touch吞掉滚动 */
body {
  touch-action: pan-y;
}

/* ===================== canvas ===================== */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  touch-action: none;
}

/* ===================== 展览区 ===================== */
section {
  height: 100vh;
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 0 8vw;
  position: relative;
  z-index: 10;
  pointer-events: none;
}

/* 文字可交互 */
.text {
  max-width: 420px;
  font-weight: 200;
  line-height: 1.7;
  letter-spacing: 0.5px;
  pointer-events: auto;
}

/* 轻微空间层次 */
section:nth-child(odd) {
  background: rgba(255,255,255,0.02);
}

/* 顶部信息 */
.header {
  position: fixed;
  top: 40px;
  left: 40px;
  font-size: 12px;
  letter-spacing: 2px;
  opacity: 0.7;
  z-index: 20;
}

/* 章节 */
.chapter {
  position: fixed;
  right: 40px;
  top: 40px;
  font-size: 11px;
  opacity: 0.4;
  z-index: 20;
}

/* 标题 */
h1 {
  font-size: 28px;
  font-weight: 300;
  margin-bottom: 8px;
}

h2 {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 18px;
}

.right {
  margin-left: auto;
  text-align: right;
}
</style>
</head>

<body>

<div class="header">GAO ZE QIAN / GLASS STUDY</div>
<div class="chapter" id="chapter">WORK 01</div>

<canvas id="webgl"></canvas>

<!-- ================= SECTION ================= -->

<section>
  <div class="text">
    <h1>Glass Object Study</h1>
    <h2>Material × Light</h2>
    玻璃作为一种“半透明结构”，在数字空间中被重新构建。
  </div>
</section>

<section>
  <div class="text right">
    <h1>Light Field</h1>
    <h2>Spatial Construction</h2>
    光不只是照明，而是塑造空间的方式。
  </div>
</section>

<section>
  <div class="text">
    <h1>Glass Poster</h1>
    <h2>2D × 3D Hybrid</h2>
    平面与三维叠加，使视觉成为连续空间体验。
  </div>
</section>

<section>
  <div class="text right">
    <h1>GAO ZE QIAN</h1>
    <h2>Artist / Designer</h2>
    南京艺术学院 · 玻璃艺术（大二）  
    专注材料 / 空间 / 数字艺术实验
  </div>
</section>

<!-- ================= THREE ================= -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

// ================= Scene =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);

// ================= Camera（修复遮头） =================
const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);

// ⭐ 关键：往下看展台 + 拉远一点避免遮头
camera.position.set(0, 0.4, 3.9);

// ================= Renderer =================
const renderer = new THREE.WebGLRenderer({
  canvas: document.querySelector("#webgl"),
  antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputEncoding = THREE.sRGBEncoding;

// ================= Light =================
const key = new THREE.DirectionalLight(0xffffff, 2.5);
key.position.set(3, 5, 2);

const fill = new THREE.DirectionalLight(0xffffff, 0.7);
fill.position.set(-3, 2, -2);

const ambient = new THREE.AmbientLight(0xffffff, 0.25);

scene.add(key, fill, ambient);

// ================= Controls =================
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.25;

// ================= Model =================
let model;

const loader = new THREE.GLTFLoader();
loader.load("./model.glb", (gltf) => {

  model = gltf.scene;

  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);

  const size = box.getSize(new THREE.Vector3());
  const max = Math.max(size.x, size.y, size.z);

  model.scale.setScalar(2.3 / max);

  // ⭐ 展台下沉（防止漂浮）
  model.position.y = -0.55;

  scene.add(model);
});

// ================= Poster =================
const tex = new THREE.TextureLoader().load("./glass.png");

const poster = new THREE.Mesh(
  new THREE.PlaneGeometry(1.6, 2.2),
  new THREE.MeshBasicMaterial({ map: tex, transparent: true })
);

poster.position.set(2.4, 0.2, -1);
scene.add(poster);

// ================= Scroll =================
let scrollY = 0;
let targetScroll = 0;

window.addEventListener("scroll", () => {
  targetScroll = window.scrollY;

  const index = Math.floor(window.scrollY / window.innerHeight) + 1;
  document.getElementById("chapter").innerText = "WORK 0" + index;
});

// ================= Resize =================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ================= Animate =================
function animate() {
  requestAnimationFrame(animate);

  // ⭐ 平滑滚动（关键）
  scrollY += (targetScroll - scrollY) * 0.08;

  const t = scrollY / (window.innerHeight * 3);

  // 🎯 Apple式镜头推进
  camera.position.z = 3.9 - t * 0.9;
  camera.position.y = 0.4 - t * 0.3;

  // 🎯 模型呼吸
  if (model) {
    model.rotation.y += 0.0025;
    model.position.y = -0.55 + Math.sin(t * 2) * 0.02;
  }

  // 🎯 海报漂浮
  poster.position.y = 0.2 + Math.sin(t * 2) * 0.12;

  controls.update();
  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
