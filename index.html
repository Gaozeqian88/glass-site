<!DOCTYPE html><html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高泽乾 · 玻璃艺术</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script><style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Inter",sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

header{
  position:fixed;
  top:0;
  width:100%;
  padding:24px 60px;
  display:flex;
  justify-content:space-between;
  z-index:100;
}

.logo{
  font-family:"Playfair Display";
  letter-spacing:4px;
}

.hero{
  height:100vh;
  position:relative;
}

#canvas3d{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

.overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  pointer-events:none;
}

.overlay h1{
  font-family:"Playfair Display";
  font-size:64px;
  letter-spacing:8px;
}

.overlay p{
  margin-top:10px;
  color:#aaa;
}

.section{
  padding:120px 80px;
}

</style></head><body><header>
  <div class="logo">GAO ZEQIAN</div>
</header><section class="hero">
  <div id="canvas3d"></div>
  <div class="overlay">
    <h1>GLASS ART</h1>
    <p>Drag to explore</p >
  </div>
</section><section class="section">
  <h2>About</h2>
  <p style="color:#aaa;margin-top:20px;max-width:600px;line-height:1.8">
    我是高泽乾，玻璃艺术创作者。
    本站展示的是围绕光与材质的实验性表达。
  </p >
</section><script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('canvas3d').appendChild(renderer.domElement);

// 光
const light1 = new THREE.PointLight(0xffffff, 1);
light1.position.set(5,5,5);
scene.add(light1);

const light2 = new THREE.PointLight(0xffffff, 0.5);
light2.position.set(-5,-5,5);
scene.add(light2);

// 玻璃材质
const material = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  metalness: 0,
  roughness: 0,
  transmission: 1,
  thickness: 1,
  transparent: true,
  opacity: 1,
});

// 模型（球体模拟玻璃）
const geometry = new THREE.SphereGeometry(1, 64, 64);
const sphere = new THREE.Mesh(geometry, material);
scene.add(sphere);

camera.position.z = 3;

// 控制器
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableZoom = false;

function animate(){
  requestAnimationFrame(animate);
  sphere.rotation.y += 0.002;
  controls.update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script></body>
</html>
