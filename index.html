<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>GAO ZE QIAN / GLASS EXHIBITION</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden; /* ⭐ 关键：禁止滑动 */
  background: #0a0a0a;
  font-family: Helvetica, Arial, sans-serif;
  color: white;
}

/* canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* ===== 展厅文本 ===== */
.section {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  padding: 0 10vw;
  opacity: 0;
  transition: 0.8s ease;
  pointer-events: none;
}

.section.active {
  opacity: 1;
}

.text {
  max-width: 420px;
  line-height: 1.7;
  font-weight: 200;
}

h1 {
  font-size: 28px;
  font-weight: 300;
  margin-bottom: 8px;
}

h2 {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 18px;
}

/* 右侧 */
.right {
  margin-left: auto;
  text-align: right;
}

/* 顶部 */
.header {
  position: fixed;
  top: 40px;
  left: 40px;
  font-size: 12px;
  letter-spacing: 2px;
  opacity: 0.7;
  z-index: 10;
}

/* ===== 底部双虚线箭头 ===== */
.nav {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 20;
  cursor: pointer;
}

.arrow {
  font-size: 18px;
  opacity: 0.6;
  letter-spacing: 2px;
  user-select: none;
}

.arrow:hover {
  opacity: 1;
}

.small {
  font-size: 10px;
  opacity: 0.4;
  margin-top: 4px;
}
</style>
</head>

<body>

<div class="header">GAO ZE QIAN / GLASS STUDY</div>

<!-- ===== 展厅文本 ===== -->
<div class="section active">
  <div class="text">
    <h1>Glass Object Study</h1>
    <h2>Material × Light</h2>
    玻璃材料在数字空间中的结构重构实验。
  </div>
</div>

<div class="section">
  <div class="text right">
    <h1>Light Field</h1>
    <h2>Spatial Construction</h2>
    光作为空间结构的一部分存在。
  </div>
</div>

<div class="section">
  <div class="text">
    <h1>Glass Poster</h1>
    <h2>2D × 3D Hybrid</h2>
    平面与三维的叠加视觉实验。
  </div>
</div>

<div class="section">
  <div class="text right">
    <h1>GAO ZE QIAN</h1>
    <h2>Artist / Designer</h2>
    南京艺术学院 · 玻璃艺术  
    三维 / 视觉设计创作者
  </div>
</div>

<!-- ===== 底部双箭头 ===== -->
<div class="nav" id="nextBtn">
  <div class="arrow">⇣ ⇣</div>
  <div class="small">NEXT</div>
</div>

<canvas id="webgl"></canvas>

<!-- libs -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

// ================= STATE =================
let index = 0;
const sections = document.querySelectorAll(".section");

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);

// ================= CAMERA =================
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0.3, 3.6);

// ================= RENDERER =================
const renderer = new THREE.WebGLRenderer({
  canvas: document.querySelector("#webgl"),
  antialias: true
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

// ================= LIGHT =================
scene.add(new THREE.AmbientLight(0xffffff, 0.3));

const key = new THREE.DirectionalLight(0xffffff, 2);
key.position.set(3, 5, 2);
scene.add(key);

// ================= CONTROLS =================
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.25;

// ================= MODEL =================
let model;

new THREE.GLTFLoader().load("./model.glb", (gltf) => {

  model = gltf.scene;

  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);

  const size = box.getSize(new THREE.Vector3());
  const max = Math.max(size.x, size.y, size.z);

  model.scale.setScalar(2.3 / max);

  model.position.y = -0.5;

  scene.add(model);
});

// ================= PAGE SWITCH =================
function setPage(i) {

  index = i;

  sections.forEach((s, idx) => {
    s.classList.toggle("active", idx === i);
  });

  // 🎯 镜头变化（展览切换感）
  camera.position.y = 0.3 + i * 0.2;
  camera.position.z = 3.6 - i * 0.15;
}

// ================= BUTTON =================
document.getElementById("nextBtn").onclick = () => {
  index = (index + 1) % sections.length;
  setPage(index);
};

// ================= RESIZE =================
addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ================= RENDER =================
function animate(){
  requestAnimationFrame(animate);

  controls.update();
  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
