<!DOCTYPE html><html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高泽乾 · 玻璃艺术</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/RGBELoader.js"></script><style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Inter",sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
}

header{
  position:fixed;
  top:0;
  width:100%;
  padding:24px 60px;
  display:flex;
  justify-content:space-between;
  z-index:100;
}

.logo{
  font-family:"Playfair Display";
  letter-spacing:4px;
}

#canvas3d{
  width:100%;
  height:100vh;
}

.overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  pointer-events:none;
}

.overlay h1{
  font-family:"Playfair Display";
  font-size:64px;
  letter-spacing:8px;
}

.overlay p{
  margin-top:10px;
  color:#aaa;
}
</style></head><body><header>
  <div class="logo">GAO ZEQIAN</div>
</header><div id="canvas3d"></div><div class="overlay">
  <h1>GLASS ART</h1>
  <p>Drag to explore</p >
</div><script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.physicallyCorrectLights = true;
renderer.outputEncoding = THREE.sRGBEncoding;

document.getElementById("canvas3d").appendChild(renderer.domElement);

// HDR环境（高级感核心）
new THREE.RGBELoader()
  .setPath("https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/")
  .load("studio_small_09_1k.hdr", function(texture){
    texture.mapping = THREE.EquirectangularReflectionMapping;
    scene.environment = texture;
  });

// 灯光
const light1 = new THREE.PointLight(0xffffff, 2);
light1.position.set(5,5,5);
scene.add(light1);

const light2 = new THREE.PointLight(0xffffff, 1.5);
light2.position.set(-5,-5,5);
scene.add(light2);

// 控制器
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableZoom = false;

camera.position.z = 3;

// 加载模型
const loader = new THREE.GLTFLoader();

loader.load("glb格式.glb", function(gltf){

  const model = gltf.scene;

  model.traverse((child)=>{
    if(child.isMesh){
      child.material = new THREE.MeshPhysicalMaterial({
        transmission: 1,
        roughness: 0,
        metalness: 0,
        thickness: 1,
        envMapIntensity: 1.5,
        clearcoat: 1,
        clearcoatRoughness: 0
      });
    }
  });

  model.scale.set(1.5,1.5,1.5);
  scene.add(model);

  function animate(){
    requestAnimationFrame(animate);
    model.rotation.y += 0.003;
    controls.update();
    renderer.render(scene, camera);
  }

  animate();

}, undefined, function(error){
  console.error("模型加载失败:", error);
});

window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script></body>
</html>
