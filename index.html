<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #0a0a0a;
  font-family: Helvetica, Arial, sans-serif;
  color: white;

/* canvas在最底层 */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
  pointer-events: none;
}

/* 页面在上层 */
.page {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
  padding: 10vh 8vw;
  box-sizing: border-box;
  z-index: 2;
}

.page.active {
  display: flex;
}

/* layout */
.left, .right {
  width: 50%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.center {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* text */
h1 {
  font-size: 28px;
  font-weight: 300;
}

p {
  font-size: 13px;
  line-height: 1.8;
  opacity: 0.75;
  max-width: 520px;
}

/* poster */
.poster {
  width: 420px;
}

/* header */
.header {
  position: fixed;
  top: 40px;
  left: 40px;
  font-size: 12px;
  letter-spacing: 2px;
  opacity: 0.6;
  z-index: 10;
}
</style>
</head>

<body>

<div class="header">GAO ZE QIAN / GLASS RITUAL</div>

<canvas id="webgl"></canvas>

<!-- PAGE 1 -->

  </div>
</section>

<!-- PAGE 3 -->
<section class="page" id="p3">
  <div class="left">
    < img src="./glass.png" class="poster">
  </div>
  <div class="right">
    <h1>Process</h1>
    <p>
      材料不是结果，而是过程本身。
    </p >

<!-- PAGE 4 -->
<section class="page" id="p4">

<!-- THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ===== STATE =====
let page = 1;

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0,0.2,3.6);

const renderer = new THREE.WebGLRenderer({
  canvas: document.querySelector("#webgl"),
  antialias: true
});
renderer.setSize(innerWidth, innerHeight);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,0.4));
const dir = new THREE.DirectionalLight(0xffffff,2);
dir.position.set(3,5,2);
scene.add(dir);

// ===== MODEL =====
let model;

new THREE.GLTFLoader().load("./model.glb",(gltf)=>{
  model = gltf.scene;
  scene.add(model);
});

// ===== 目标状态（用于动画插值）=====
let targetPos = new THREE.Vector3(0,0,0);
let targetScale = new THREE.Vector3(1,1,1);

// ===== 页面切换 =====
function switchPage(i){

  document.querySelectorAll(".page")
    .forEach(p=>p.classList.remove("active"));

  document.getElementById("p"+i).classList.add("active");

  if(i===1){
    targetPos.set(0,0,0);
    targetScale.set(1.8,1.8,1.8);
  }

  if(i===2){
    targetPos.set(2,0,-1);
    targetScale.set(1,1,1);
  }

  if(i===3){
    targetPos.set(-2,0,-1);
    targetScale.set(0.9,0.9,0.9);
  }

  if(i===4){
    targetPos.set(0,-1,0);
    targetScale.set(0.6,0.6,0.6);
  }
}

// ===== 滚轮翻页 =====
let lock = false;

window.addEventListener("wheel",(e)=>{

  if(lock) return;
  lock = true;

  if(e.deltaY > 0) page++;
  else page--;

  page = Math.max(1, Math.min(4, page));

  switchPage(page);

  setTimeout(()=>lock=false, 800);

});

// ===== 动画循环 =====
function animate(){
  requestAnimationFrame(animate);

  if(model){

    // ⭐ 平滑移动（核心）
    model.position.lerp(targetPos, 0.08);
    model.scale.lerp(targetScale, 0.08);

    // 第一屏轻微旋转
    if(page===1){
      model.rotation.y += 0.003;
    }else{
      model.rotation.y += 0.01;
    }
  }

  renderer.render(scene,camera);
}

animate();

// ===== resize =====
addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
