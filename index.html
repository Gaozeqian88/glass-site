 <!DOCTYPE html> <html lang="zh-CN"> <head> <meta charset="utf-8" /> <title>模型加载诊断</title> <meta name="viewport" content="width=device-width, initial-scale=1" /> <style> html,body{height:100%;margin:0;background:#050505;color:#fff;font-family:Arial,Helvetica,sans-serif} #c{display:block;width:100%;height:100%} #overlay{position:fixed;left:12px;top:12px;z-index:20;background:rgba(0,0,0,0.5);padding:10px;border-radius:6px;max-width:calc(100% - 24px)} #overlay b{display:block;margin-bottom:6px} #log{white-space:pre-wrap;font-size:13px;line-height:1.3} a{color:#8fd4ff} </style> </head> <body> <canvas id="c"></canvas> <div id="overlay"> <b id="status">状态：正在尝试加载本地 model.glb …</b> <div id="log">提示：请按 F12 打开控制台（Console）。页面会尝试本地加载 model.glb，然后尝试在线示例。</div> </div>
<!-- 使用 CDN，不依赖本地 three.min.js 等 --> <script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script> <script src="https://unpkg.com/three@0.150.1/examples/js/loaders/GLTFLoader.js"></script> <script src="https://unpkg.com/three@0.150.1/examples/js/controls/OrbitControls.js"></script>
<script> const statusEl = document.getElementById('status'); const logEl = document.getElementById('log'); function log(...args){ console.log(...args); logEl.innerText += '\n' + args.map(a=> (typeof a==='object'?JSON.stringify(a):String(a))).join(' '); } window.addEventListener('error', e => { log('window.onerror: ', e.message || e); });
// 三个重要路径
const localModel = 'model.glb'; // 你本地的模型（必须与 index.html 同一文件夹）
const fallbackModel = 'https://rawcdn.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/Box/glTF-Binary/Box.glb';

// 基本场景
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
const scene = new THREE.Scene(); scene.background = new THREE.Color(0x111111);
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 1.2, 3);
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.0));
const dl = new THREE.DirectionalLight(0xffffff, 0.8); dl.position.set(5,5,5); scene.add(dl);

window.addEventListener('resize', ()=> {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const loader = new THREE.GLTFLoader();

function tryLoad(url, onSuccess, onProgress, onError) {
  statusEl.innerText = '状态：正在加载 → ' + url;
  log('尝试加载：', url);
  loader.load(url, gltf => {
    log('加载成功：', url);
    onSuccess(gltf);
  }, p => {
    const perc = p.total ? Math.round(p.loaded / p.total * 100) + '%' : Math.round(p.loaded/1024) + ' bytes';
    statusEl.innerText = '状态：加载中 ' + url + ' (' + perc + ')';
    // 每次进度也写到 log，便于查看
    log('进度：', url, perc);
    if (onProgress) onProgress(p);
  }, err => {
    log('加载出错：', url, err && (err.message || err));
    if (onError) onError(err);
  });
}

function placeModel(gltf){
  // 清空先前对象（如果有）
  const old = scene.getObjectByName('__user_model_group');
  if (old) scene.remove(old);
  const group = new THREE.Group();
  group.name = '__user_model_group';
  group.add(gltf.scene);
  scene.add(group);

  // 简单居中与缩放
  const box = new THREE.Box3().setFromObject(gltf.scene);
  const size = new THREE.Vector3(); box.getSize(size);
  const center = new THREE.Vector3(); box.getCenter(center);
  gltf.scene.position.sub(center);
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const scale = 1.6 / maxDim;
  gltf.scene.scale.setScalar(scale);

  statusEl.innerText = '状态：模型已加载成功（来自 ' + (gltf.userDataSource||'本地') + '）';
  log('模型尺寸：', size, '缩放：', scale);
}

// 1. 先尝试加载本地 model.glb
tryLoad(localModel, function(gltf){
  gltf.userDataSource = '本地 model.glb';
  placeModel(gltf);
}, null, function(err){
  // 本地加载失败后尝试在线示例
  statusEl.innerText = '状态：本地 model.glb 加载失败，正在尝试在线示例…';
  log('本地加载失败，尝试在线备用模型：', fallbackModel);
  tryLoad(fallbackModel, function(gltf){
    gltf.userDataSource = '在线示例 (fallback)';
    placeModel(gltf);
  }, null, function(err2){
    // 两者都失败，给出可能原因和建议
    statusEl.innerText = '状态：本地和在线模型都加载失败，请看下方建议（并把控制台第一条红色错误贴给我）';
    log('两次加载均失败。可能原因：\n1) 本地 model.glb 未放在与 index.html 同一文件夹，或文件名不正确；\n2) 你是通过 file:// 打开页面，浏览器阻止了模型加载（CORS）——请用本地服务器；\n3) 网络或防火墙阻止访问外部资源；\n4) 模型文件损坏。');
    log('诊断提示：如果你使用的是 file://（直接双击打开），请在该文件夹打开终端运行：\n  python -m http.server 8000\n然后在浏览器打开 http://localhost:8000 再试。');
  });
});

// 渲染循环
(function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
</script> </body> </html>
