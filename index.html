<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass Site</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
    }
    #container {
      position: fixed;
      inset: 0;
    }
    #loading {
      position: fixed;
      left: 16px;
      top: 16px;
      color: #fff;
      background: rgba(0,0,0,0.55);
      padding: 10px 14px;
      border-radius: 8px;
      z-index: 10;
      font-size: 14px;
      line-height: 1.4;
      max-width: calc(100vw - 32px);
      white-space: pre-wrap;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="loading">正在加载中，请稍等...</div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.150.1/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.150.1/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.150.1/examples/jsm/loaders/GLTFLoader.js';

    const loadingEl = document.getElementById('loading');
    const container = document.getElementById('container');

    function setLoading(text) {
      loadingEl.textContent = text;
      console.log(text);
    }

    // 场景
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    // 相机
    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 1.2, 3);

    // 渲染器
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // 控制器
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 灯光
    const ambient = new THREE.AmbientLight(0xffffff, 1.6);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // 地面参考（可删）
    const grid = new THREE.GridHelper(10, 10, 0x444444, 0x222222);
    scene.add(grid);

    // 模型加载
    const loader = new GLTFLoader();

    // 你的本地模型文件，必须和 index.html 在同一目录
    const localModel = './model.glb';

    // 在线备用模型（用于测试）
    const fallbackModel = 'https://rawcdn.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/Box/glTF-Binary/Box.glb';

    function centerAndScale(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      object.position.x += (object.position.x - center.x);
      object.position.y += (object.position.y - center.y);
      object.position.z += (object.position.z - center.z);

      const maxAxis = Math.max(size.x, size.y, size.z);
      if (maxAxis > 0) {
        const scale = 1.5 / maxAxis;
        object.scale.setScalar(scale);
      }
    }

    function loadModel(url, label, onDone, onFail) {
      setLoading(`正在加载 ${label} ...`);
      loader.load(
        url,
        (gltf) => {
          const model = gltf.scene;
          centerAndScale(model);
          scene.add(model);
          setLoading(`${label} 加载成功`);
          onDone && onDone(model);
        },
        (xhr) => {
          if (xhr.total) {
            const p = Math.round((xhr.loaded / xhr.total) * 100);
            setLoading(`正在加载 ${label} ... ${p}%`);
          } else {
            setLoading(`正在加载 ${label} ...`);
          }
        },
        (err) => {
          console.error(`加载失败: ${label}`, err);
          onFail && onFail(err);
        }
      );
    }

    // 先加载本地 model.glb，失败就加载备用在线模型
    loadModel(
      localModel,
      '本地模型 model.glb',
      () => {},
      () => {
        setLoading('本地 model.glb 加载失败，正在尝试在线示例模型...');
        loadModel(
          fallbackModel,
          '在线示例模型',
          () => {},
          (err) => {
            setLoading('模型加载失败，请打开控制台查看错误');
            console.error('本地和在线模型都失败了', err);
          }
        );
      }
    );

    // 旋转动画
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // 窗口大小变化
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
