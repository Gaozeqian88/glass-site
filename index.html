<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GAO ZEQIAN - GLASS ART</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#fff;
  font-family:Arial, Helvetica, sans-serif;
  overflow-x:hidden;
}

/* 顶部名字 */
.nav{
  position:fixed;
  top:30px;
  left:40px;
  z-index:10;
  letter-spacing:3px;
  font-size:14px;
}

/* 3D区域 */
.hero{
  height:100vh;
  position:relative;
}

#viewer{
  width:100%;
  height:100%;
}

/* 标题 */
.title{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:80px;
  letter-spacing:8px;
  pointer-events:none;
}

/* 作品区域 */
.section{
  padding:120px 80px;
  background:#111;
}

.work{
  max-width:900px;
  margin:auto;
  text-align:center;
}

.work img{
  width:100%;
  margin-top:40px;
}

.desc{
  margin-top:30px;
  color:#aaa;
  line-height:1.8;
}
</style>
</head>

<body>

<div class="nav">GAO ZEQIAN</div>

<!-- 3D -->
<div class="hero">
  <div id="viewer"></div>
  <div class="title">GLASS ART</div>
</div>

<!-- 作品介绍 -->
<div class="section">
  <div class="work">
    <h2>GLASS SCULPTURE 01</h2>
    <p class="desc">
      玻璃材质艺术雕塑，探索光线与形态的关系。<br>
      Designed by Gao Zeqian · 2026
    </p >

    <!-- 这里先用你这张图 -->
    < img src="your-image.jpg">
  </div>
</div>

<!-- Three.js CDN（关键！！） -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

<script>
// 场景
const scene = new THREE.Scene();

// 相机
const camera = new THREE.PerspectiveCamera(
  50,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.set(0,0,6);

// 渲染器
const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.physicallyCorrectLights = true;
document.getElementById("viewer").appendChild(renderer.domElement);

// 光
const light1 = new THREE.DirectionalLight(0xffffff,1.5);
light1.position.set(5,5,5);
scene.add(light1);

const light2 = new THREE.DirectionalLight(0xffffff,1);
light2.position.set(-5,3,-5);
scene.add(light2);

// 控制器
const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;

// 加载模型
const loader = new THREE.GLTFLoader();

loader.load("glb格式.glb", function(gltf){

  const model = gltf.scene;

  // 🔥 自动居中（解决你轴心问题）
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);

  // 🔥 自动缩放（解决太小问题）
  const size = box.getSize(new THREE.Vector3());
  const scale = 3 / size.length();
  model.scale.setScalar(scale);

  // 🔥 玻璃材质（关键优化）
  model.traverse((child)=>{
    if(child.isMesh){
      child.material = new THREE.MeshPhysicalMaterial({
        color:0xffffff,
        roughness:0.05,
        transmission:1,
        thickness:2,
        ior:1.45,
        clearcoat:1,
        envMapIntensity:1.5
      });
    }
  });

  scene.add(model);

  // 动画
  function animate(){
    requestAnimationFrame(animate);
    model.rotation.y += 0.002;
    controls.update();
    renderer.render(scene,camera);
  }

  animate();

});

// 自适应
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
